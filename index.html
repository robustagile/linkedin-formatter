<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinkedIn Post Formatter</title>
    <meta property="og:title" content="LinkedIn Post Formatter – Bold, Italic, Bullets & Emojis" />
    <meta property="og:description" content="Format LinkedIn posts with bold, italic, underline, strikethrough, bullets, numbered lists, emojis, and copy-paste-safe Unicode text." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://robustagile.com/linkedin-formatter/" />
    <meta property="og:image" content="https://robustagile.com/linkedin-formatter/img/screenshot.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="LinkedIn Post Formatter" />
    <meta name="twitter:description" content="Free copy-paste formatter for LinkedIn posts." />
    <meta name="twitter:image" content="https://robustagile.com/linkedin-formatter/img/screenshot.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/htm@3/dist/htm.umd.js"></script>
    <script crossorigin src="https://cdn.jsdelivr.net/npm/emoji-mart@5/dist/browser.js"></script>
    <style>
      /* emoji-mart picker chrome */
      em-emoji-picker {
        --rgb-background: 255, 255, 255;
        --border-radius: 8px;
        --shadow: 0 10px 25px -5px rgb(0 0 0 / 0.1), 0 4px 10px -3px rgb(0 0 0 / 0.05);
        height: 360px;
        max-height: 360px;
      }
      textarea { font-feature-settings: "ss01"; }

      /* Always-visible thin scrollbar for the symbol picker (overrides
         macOS/Chrome auto-hide so users can see tabs/chars overflow). */
      .symbol-picker { scrollbar-width: thin; scrollbar-color: rgba(0,0,0,0.25) transparent; }
      .symbol-picker *::-webkit-scrollbar { width: 8px; height: 8px; }
      .symbol-picker *::-webkit-scrollbar-track { background: transparent; }
      .symbol-picker *::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.22); border-radius: 4px; }
      .symbol-picker *::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.4); }

      /* Hide scrollbar for the mobile toolbar's horizontal scroll area. */
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { scrollbar-width: none; -ms-overflow-style: none; }

      /* Bottom-sheet slide-up animation (mobile popovers). */
      @keyframes slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
      .animate-slide-up { animation: slide-up 200ms ease-out; }

      @media (max-width: 767px) {
        /* Emoji-mart picker fills the bottom-sheet width/height on mobile.
           min-height: 0 overrides emoji-mart's internal 230px floor (otherwise
           the picker grows past its container). flex: 1 + parent-as-flex makes
           the picker fit its share of the container exactly. */
        em-emoji-picker {
          --border-radius: 0;
          width: 100%;
          max-width: 100%;
          min-width: 0;
          height: 100%;
          max-height: 100%;
          min-height: 0;
          flex: 1;
          overflow: hidden;
        }
      }
    </style>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "LinkedIn Post Formatter",
        "url": "https://robustagile.com/linkedin-formatter/",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Any",
        "description": "Free web tool to format LinkedIn posts with bold, italic, underline, strikethrough, monospace, bullets, numbered lists, and emojis using Unicode text.",
        "isAccessibleForFree": true,
        "creator": {
          "@type": "Organization",
          "name": "Robust Agile"
        },
        "codeRepository": "https://github.com/robustagile/linkedin-formatter"
      }
    </script>
  </head>
  <body class="bg-gradient-to-br from-slate-50 via-white to-blue-50/40 min-h-screen text-zinc-900 antialiased">
    <div id="root"></div>
    <script src="app.js"></script>
  </body>
</html>
